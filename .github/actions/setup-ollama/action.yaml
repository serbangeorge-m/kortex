name: Setup Ollama
description: Install Ollama, pull a model, and serve it. Sets OLLAMA_ENABLED in the environment on success.

inputs:
  model:
    description: 'Model to pull and serve (e.g., granite3.2:2b)'
    required: true

outputs:
  enabled:
    description: "'true' if the model is ready, 'false' otherwise"
    value: ${{ steps.pull.outputs.enabled }}

runs:
  using: composite
  steps:
    - name: Setup Ollama
      uses: ai-action/setup-ollama@71ea83e32be8721c648fa946c5da9853679a3803 # v2

    - name: Cache Ollama models
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: ~/.ollama/models
        key: ollama-${{ inputs.model }}-${{ runner.os }}

    - name: Pull Ollama model
      id: pull
      shell: bash
      run: |
        # Wait for Ollama server to be ready (up to 60 seconds)
        for i in {1..30}; do
          if ollama list &> /dev/null; then
            echo "Ollama server is ready"
            break
          fi
          echo "Waiting for Ollama server... (attempt $i/30)"
          sleep 2
          if [ "$i" -eq 30 ]; then
            echo "Ollama server failed to start"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
        done

        # Check if model is already cached and available
        if ollama list | grep -q "${{ inputs.model }}"; then
          echo "Model ${{ inputs.model }} is already available (from cache)"
          echo "OLLAMA_ENABLED=true" >> "$GITHUB_ENV"
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Pull the model with retries (digest mismatch is a known Ollama issue)
        for attempt in {1..5}; do
          echo "Pulling ${{ inputs.model }} model (attempt $attempt/5)..."
          ollama rm "${{ inputs.model }}" 2>/dev/null || true

          if ollama pull "${{ inputs.model }}" 2>&1 && ollama list | grep -q "${{ inputs.model }}"; then
            echo "Model ${{ inputs.model }} is ready"
            echo "OLLAMA_ENABLED=true" >> "$GITHUB_ENV"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          wait_time=$((attempt * 10))
          echo "Pull failed, retrying in ${wait_time} seconds..."
          sleep $wait_time
        done

        echo "::warning::Failed to pull ${{ inputs.model }} model after 5 attempts - Ollama tests will be skipped"
        echo "enabled=false" >> "$GITHUB_OUTPUT"
